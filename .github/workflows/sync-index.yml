name: Sync Knowledge Index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      APP_NAME: GenAI Chatbot API
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      ALLOWED_ORIGINS: https://example.com
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.0-flash
      GEMINI_EMBEDDING_MODEL: text-embedding-004
      EMBEDDING_DIMENSIONS: 768
      MAX_CONTEXT_CHUNKS: 4
      VECTOR_BACKEND: postgres
      POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
      PGVECTOR_TABLE: knowledge_chunks
      SOURCE_URLS: https://handbook.gitlab.com,https://about.gitlab.com/direction/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Sync index
        run: |
          cd backend
          PYTHONPATH=. python ../scripts/sync_index.py
